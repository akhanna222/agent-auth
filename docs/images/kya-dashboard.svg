<svg xmlns="http://www.w3.org/2000/svg" width="960" height="620" viewBox="0 0 960 620">
  <defs>
    <style>
      text { font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="960" height="620" fill="#0f1117" rx="8"/>

  <!-- Header -->
  <rect x="0" y="0" width="960" height="48" fill="#1a1d27" rx="8"/>
