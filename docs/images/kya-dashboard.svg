  <text x="236" y="140" fill="#a29bfe" font-size="24" font-weight="700">4</text>
  <text x="236" y="156" fill="#8b8fa8" font-size="9" letter-spacing="1">AGENTS</text>

  <rect x="397" y="104" width="165" height="64" fill="#242836" rx="6"/>
  <text x="417" y="140" fill="#a29bfe" font-size="24" font-weight="700">3</text>
  <text x="417" y="156" fill="#8b8fa8" font-size="9" letter-spacing="1">DELEGATIONS</text>

