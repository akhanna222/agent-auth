  <text x="240" y="450" fill="#a29bfe" font-size="11">"decision"</text><text x="322" y="450" fill="#8b8fa8" font-size="11">:</text><text x="336" y="450" fill="#00b894" font-size="11">"allow"</text><text x="386" y="450" fill="#8b8fa8" font-size="11">,</text>
