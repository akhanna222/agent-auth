  <text x="240" y="486" fill="#a29bfe" font-size="11">"risk_score"</text><text x="342" y="486" fill="#8b8fa8" font-size="11">:</text><text x="356" y="486" fill="#f39c12" font-size="11">5</text><text x="364" y="486" fill="#8b8fa8" font-size="11">,</text>
  <text x="240" y="504" fill="#a29bfe" font-size="11">"decision_id"</text><text x="350" y="504" fill="#8b8fa8" font-size="11">:</text><text x="364" y="504" fill="#00b894" font-size="11">"dec_sandbox_a3f2c1"</text><text x="548" y="504" fill="#8b8fa8" font-size="11">,</text>
  <text x="240" y="522" fill="#a29bfe" font-size="11">"constraints_verified"</text><text x="442" y="522" fill="#8b8fa8" font-size="11">: {</text>
  <text x="260" y="540" fill="#a29bfe" font-size="11">"amount_within_limit"</text><text x="450" y="540" fill="#8b8fa8" font-size="11">:</text><text x="464" y="540" fill="#00b894" font-size="11">true</text><text x="492" y="540" fill="#8b8fa8" font-size="11">, ...</text>
  <text x="240" y="558" fill="#8b8fa8" font-size="11">}</text>
  <text x="228" y="576" fill="#8b8fa8" font-size="11">}</text>
